name: ti-mmwave-sdk-env

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  repo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Repository smoke test without SDK image
        run: make github-actions-smoke cmake-portability

  sdk-full-sha256:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SDK_FULL_IMAGE: ${{ vars.SDK_FULL_IMAGE || 'meowpas/ti-mmwave-sdk:03.06.02' }}
      SDK_CI_PROFILES: >-
        xwr1843boost-mss-only
        xwr1843boost-mss-dss
        xwr6843isk-mss-only
        xwr6843isk-mss-dss
        xwr6843aop-mss-only
    steps:
      - uses: actions/checkout@v5
      - name: Require SDK image credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$SDK_FULL_IMAGE" ]; then
            echo "::error::SDK_FULL_IMAGE is empty."
            exit 1
          fi
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required for every-push SDK SHA-256 validation."
            exit 1
          fi
      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          printf '%s\n' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - name: Pull SDK-full image
        run: docker pull "$SDK_FULL_IMAGE"
      - name: Compare direct SDK and forked CMake demo profile SHA-256
        run: PROFILE_VALIDATION_JOBS=all DEMO_PROFILES="$SDK_CI_PROFILES" SDK_FULL_IMAGE="$SDK_FULL_IMAGE" make sdk-profile-validate
      - name: Validate no-clone installer profile matrix
        run: INSTALL_VALIDATION_JOBS=all DEMO_PROFILES="$SDK_CI_PROFILES" SDK_FULL_IMAGE="$SDK_FULL_IMAGE" make install-profile-validate
      - name: Upload SHA-256 validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-profile-sha256-validation
          path: |
            reports/demo-profile-validation-*.md
            reports/demo-profile-*.log
            reports/install-profile-validation-*.md
            reports/install-profile-*.log
          if-no-files-found: warn
