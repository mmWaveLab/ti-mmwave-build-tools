name: ti-mmwave-sdk-env

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Public smoke test without TI SDK
        run: make github-actions-smoke cmake-portability

  docker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t ti-mmwave-build-tools:ci .
      - name: Container entrypoint smoke
        run: docker run --rm ti-mmwave-build-tools:ci bash -lc 'command -v cmake && command -v ninja && command -v check-ti-linux'

  sdk-full-image-smoke:
    if: github.event_name != 'pull_request' && vars.SDK_FULL_IMAGE != ''
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5
      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_TOKEN" ]; then
            printf '%s\n' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
          else
            echo "No Docker Hub credentials configured; relying on runner Docker auth."
          fi
      - name: Pull private SDK-full image
        run: docker pull "${{ vars.SDK_FULL_IMAGE }}"
      - name: Compare direct SDK and forked CMake demo profiles
        run: SDK_FULL_IMAGE="${{ vars.SDK_FULL_IMAGE }}" make sdk-profile-validate

  self-hosted-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ti-mmwave]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Full SDK CI
        run: CI_FULL_BUILD=1 scripts/ci.sh
