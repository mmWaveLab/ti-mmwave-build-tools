name: ti-mmwave-sdk-env

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  public-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v5
      - name: Public smoke test without TI SDK
        run: make github-actions-smoke cmake-portability

  docker-image:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - name: Build Docker image
        run: docker build -t ti-mmwave-build-tools:ci .
      - name: Container entrypoint smoke
        run: docker run --rm ti-mmwave-build-tools:ci bash -lc 'command -v cmake && command -v ninja && command -v check-ti-linux'

  sdk-full-sha256:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      SDK_FULL_IMAGE: ${{ vars.SDK_FULL_IMAGE || 'meowpas/ti-mmwave-sdk:03.06.02' }}
    steps:
      - uses: actions/checkout@v5
      - name: Require private SDK image credentials
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          if [ -z "$SDK_FULL_IMAGE" ]; then
            echo "::error::SDK_FULL_IMAGE is empty."
            exit 1
          fi
          if [ -z "$DOCKERHUB_USERNAME" ] || [ -z "$DOCKERHUB_TOKEN" ]; then
            echo "::error::DOCKERHUB_USERNAME and DOCKERHUB_TOKEN secrets are required for every-push SDK SHA-256 validation."
            exit 1
          fi
      - name: Login to Docker Hub
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          printf '%s\n' "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
      - name: Pull private SDK-full image
        run: docker pull "$SDK_FULL_IMAGE"
      - name: Compare direct SDK and forked CMake demo profile SHA-256
        run: PROFILE_VALIDATION_JOBS=all SDK_FULL_IMAGE="$SDK_FULL_IMAGE" make sdk-profile-validate
      - name: Validate no-clone installer profile matrix
        run: INSTALL_VALIDATION_JOBS=all SDK_FULL_IMAGE="$SDK_FULL_IMAGE" make install-profile-validate
      - name: Upload SHA-256 validation report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-profile-sha256-validation
          path: |
            reports/demo-profile-validation-*.md
            reports/demo-profile-*.log
            reports/install-profile-validation-*.md
            reports/install-profile-*.log
          if-no-files-found: warn

  self-hosted-full:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ti-mmwave]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - name: Full SDK CI
        run: CI_FULL_BUILD=1 scripts/ci.sh
